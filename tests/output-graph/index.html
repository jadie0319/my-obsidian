<!DOCTYPE html>

<head>

<body>
  <div class="index-layout">
    <!-- Graph 섹션 (상단) -->
    <section class="graph-section">
      <div class="graph-controls">
        <input type="text" id="search-input" placeholder="Search nodes...">
        <select id="tag-filter">
          <option value="">All tags</option>
        </select>
        <label>
          <input type="checkbox" id="show-orphans-only">
          Show orphans only
        </label>
        <button id="reset-graph">Reset View</button>
      </div>
      <div id="graph-container"></div>
      <div id="graph-legend"></div>
    </section>

    <!-- 페이지 목록 섹션 (하단) -->
    <section class="page-list-section">
      <div class="container">
        <header>
          <h1>My Digital Garden</h1>
        </header>

        <main>
          <section class="page-list">
            <h2>All Pages</h2>
            <ul>
              <li>
                <a href="/readme.html">Welcome to My Digital Garden</a>
                <p>This is a sample Obsidian vault for testing</p>
                <span class="date">Mon Mar 09 2026 09:00:00 GMT+0900 (Korean Standard Time)</span>
              </li>
              <li>
                <a href="/another-note.html">Another Note</a>
              </li>
            </ul>
          </section>
        </main>

        <footer>
          <p>Generated by my-obsidian</p>
        </footer>
      </div>
    </section>
  </div>

  <script src="/assets/scripts/graph.js"></script>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - {{siteTitle}}</title>
  {{#if description}}
  <meta name="description" content="{{description}}">
  {{/if}}
  <link rel="stylesheet" href="{{basePath}}assets/styles/main.css">
</head>
<body>
  <div class="container">
    <header>
      <nav>
        <a href="{{basePath}}" class="site-title">{{siteTitle}}</a>
      </nav>
    </header>

    <main>
      <article>
        <h1>{{title}}</h1>
        {{#if date}}
        <p class="date">{{date}}</p>
        {{/if}}
        {{#if tags}}
        <div class="tags">
          {{#each tags}}
          <span class="tag">{{this}}</span>
          {{/each}}
        </div>
        {{/if}}

        <div class="content">
          {{{content}}}
        </div>
      </article>
    </main>

    <footer>
      <p>Generated by my-obsidian</p>
    </footer>
  </div>
</body>
</html>

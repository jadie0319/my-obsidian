<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{siteTitle}}</title>
  {{#if description}}
  <meta name="description" content="{{description}}">
  {{/if}}
  <link rel="stylesheet" href="{{basePath}}assets/styles/main.css">
  <link rel="stylesheet" href="{{basePath}}assets/styles/graph.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <div class="index-layout">
    <!-- Graph 섹션 (상단) -->
    <section class="graph-section">
      <div class="graph-controls">
        <input type="text" id="search-input" placeholder="Search nodes...">
        <select id="tag-filter">
          <option value="">All tags</option>
        </select>
        <label>
          <input type="checkbox" id="show-orphans-only">
          Show orphans only
        </label>
        <button id="reset-graph">Reset View</button>
      </div>
      <div id="graph-container"></div>
      <div id="graph-legend"></div>
    </section>

    <!-- 페이지 목록 섹션 (하단) -->
    <section class="page-list-section">
      <div class="container">
        <header>
          <h1>{{siteTitle}}</h1>
          {{#if description}}
          <p class="description">{{description}}</p>
          {{/if}}
        </header>

        <main>
          <section class="tag-list">
            <h2>Tags</h2>
            <div id="tag-list-container"></div>
          </section>
        </main>

        <footer>
          <p>Generated by my-obsidian</p>
        </footer>
      </div>
    </section>
  </div>

  <!-- Graph 데이터 (JSON) -->
  <script type="application/json" id="graph-data">
    {{{graphData}}}
  </script>

  <script src="{{basePath}}assets/scripts/graph.js"></script>
  <script>
    (function() {
      var data = JSON.parse(document.getElementById('graph-data').textContent);
      var tagCounts = {};
      data.nodes.forEach(function(n) {
        (n.tags || []).forEach(function(t) {
          tagCounts[t] = (tagCounts[t] || 0) + 1;
        });
      });
      var sorted = Object.keys(tagCounts).sort(function(a, b) {
        return tagCounts[b] - tagCounts[a];
      });
      var container = document.getElementById('tag-list-container');
      sorted.forEach(function(tag) {
        var item = document.createElement('span');
        item.className = 'tag-item';
        item.innerHTML = tag + '<span class="tag-count">' + tagCounts[tag] + '</span>';
        container.appendChild(item);
      });
    })();
  </script>
</body>
</html>

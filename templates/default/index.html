<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{siteTitle}}</title>
  {{#if description}}
  <meta name="description" content="{{description}}">
  {{/if}}
  <link rel="stylesheet" href="{{basePath}}assets/styles/main.css">
  <link rel="stylesheet" href="{{basePath}}assets/styles/graph.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-inner">
      <a href="{{basePath}}" class="site-title">{{siteTitle}}</a>
    </div>
  </nav>

  <div class="index-layout">
    <!-- Graph 섹션 (상단) -->
    <section class="graph-section">
      <div class="graph-controls">
        <input type="text" id="search-input" placeholder="Search nodes...">
        <select id="tag-filter">
          <option value="">All tags</option>
        </select>
        <label>
          <input type="checkbox" id="show-orphans-only">
          Show orphans only
        </label>
        <button id="reset-graph">Reset View</button>
      </div>
      <div class="graph-tag-legend" id="graph-tag-legend"></div>
      <div id="graph-container"></div>
    </section>

    <!-- 페이지 목록 섹션 (하단) -->
    <section class="page-list-section">
      <div class="container">
        <main>
          <section class="recent-uploads">
            <h2>Recent Uploads</h2>
            <div id="recent-uploads-container"></div>
          </section>

          <section class="tag-list">
            <h2>Tags</h2>
            <div id="tag-tree-container"></div>
          </section>
        </main>

        <footer>
          <p>Generated by my-obsidian</p>
        </footer>
      </div>
    </section>
  </div>

  <!-- Graph 데이터 (JSON) -->
  <script type="application/json" id="graph-data">
    {{{graphData}}}
  </script>

  <script src="{{basePath}}assets/scripts/graph.js"></script>
  <script>
    (function() {
      var basePath = '{{basePath}}';
      var data = JSON.parse(document.getElementById('graph-data').textContent);

      // Collect flat tag list with counts from normalized tags
      var tagCounts = {};
      data.nodes.forEach(function(n) {
        (n.tags || []).forEach(function(tag) {
          tagCounts[tag] = (tagCounts[tag] || 0) + 1;
        });
      });

      // Sort tags alphabetically
      var tags = Object.keys(tagCounts).sort();

      // Render flat tag list as single buttons (name + count combined)
      var html = '<div class="tag-flat-list">';
      tags.forEach(function(tag) {
        var count = tagCounts[tag];
        var url = basePath + 'tags/' + tag + '/';
        html += '<a href="' + url + '" class="tag-flat-item">#' + tag + ' (' + count + ')</a>';
      });
      html += '</div>';

      var container = document.getElementById('tag-tree-container');
      container.innerHTML = html;

      // Render recent uploads
      var recentPages = {{{recentPages}}};
      var recentHtml = '<div class="recent-uploads-grid">';
      recentPages.forEach(function(page, i) {
        recentHtml += '<a href="' + page.url + '" class="recent-upload-btn">'
          + '<span class="recent-upload-num">' + (i + 1) + '</span>'
          + '<span class="recent-upload-title">' + page.title + '</span>'
          + '</a>';
      });
      recentHtml += '</div>';
      document.getElementById('recent-uploads-container').innerHTML = recentHtml;
    })();
  </script>
</body>
</html>

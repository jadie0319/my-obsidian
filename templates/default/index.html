<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{siteTitle}}</title>
  {{#if description}}
  <meta name="description" content="{{description}}">
  {{/if}}
  <link rel="stylesheet" href="{{basePath}}assets/styles/main.css">
  <link rel="stylesheet" href="{{basePath}}assets/styles/graph.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-inner">
      <a href="{{basePath}}" class="site-title">{{siteTitle}}</a>
    </div>
  </nav>

  <div class="index-layout">
    <!-- Graph 섹션 (상단) -->
    <section class="graph-section">
      <div class="graph-controls">
        <input type="text" id="search-input" placeholder="Search nodes...">
        <select id="tag-filter">
          <option value="">All tags</option>
        </select>
        <label>
          <input type="checkbox" id="show-orphans-only">
          Show orphans only
        </label>
        <button id="reset-graph">Reset View</button>
      </div>
      <div id="graph-container"></div>
      <div id="graph-legend"></div>
    </section>

    <!-- 페이지 목록 섹션 (하단) -->
    <section class="page-list-section">
      <div class="container">
        <main>
          <section class="tag-list">
            <h2>Tags</h2>
            <div id="tag-tree-container"></div>
          </section>
        </main>

        <footer>
          <p>Generated by my-obsidian</p>
        </footer>
      </div>
    </section>
  </div>

  <!-- Graph 데이터 (JSON) -->
  <script type="application/json" id="graph-data">
    {{{graphData}}}
  </script>

  <script src="{{basePath}}assets/scripts/graph.js"></script>
  <script>
    (function() {
      var data = JSON.parse(document.getElementById('graph-data').textContent);

      // Build hierarchical tag tree
      // Each tag like "AI/ML/DL" contributes count to "AI", "AI/ML", "AI/ML/DL"
      var tagTree = {};

      function addToTree(tree, parts, depth) {
        if (depth >= parts.length) return;
        var part = parts[depth];
        if (!tree[part]) {
          tree[part] = {
            fullPath: parts.slice(0, depth + 1).join('/'),
            count: 0,
            children: {}
          };
        }
        tree[part].count++;
        addToTree(tree[part].children, parts, depth + 1);
      }

      data.nodes.forEach(function(n) {
        (n.tags || []).forEach(function(fullTag) {
          var parts = fullTag.split('/');
          addToTree(tagTree, parts, 0);
        });
      });

      // Render tag tree as HTML
      function renderTree(tree, depth) {
        var keys = Object.keys(tree).sort();
        if (keys.length === 0) return '';
        var html = depth === 0 ? '<div class="tag-tree">' : '<div class="tag-tree-children">';
        keys.forEach(function(key) {
          var node = tree[key];
          var hasChildren = Object.keys(node.children).length > 0;
          html += '<div class="tag-tree-row">';
          html += '<div class="tag-tree-item" data-tag="' + node.fullPath + '">';
          if (depth > 0) {
            html += '<span class="tag-tree-connector">└</span>';
          }
          html += '<span class="tag-tree-name">' + key + '</span>';
          html += '<span class="tag-count">' + node.count + '</span>';
          html += '</div>';
          if (hasChildren) {
            html += renderTree(node.children, depth + 1);
          }
          html += '</div>';
        });
        html += '</div>';
        return html;
      }

      var container = document.getElementById('tag-tree-container');
      container.innerHTML = renderTree(tagTree, 0);
    })();
  </script>
</body>
</html>

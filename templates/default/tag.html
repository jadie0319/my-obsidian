<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>#{{tag}} - {{siteTitle}}</title>
  <link rel="stylesheet" href="{{basePath}}assets/styles/main.css">
</head>
<body>
  <nav class="top-nav">
    <div class="nav-inner">
      <a href="{{basePath}}" class="site-title">{{siteTitle}}</a>
    </div>
  </nav>

  <div class="container">
    <header class="tag-page-header">
      <a href="{{basePath}}" class="back-link">← Home</a>
      <h1 class="tag-page-title"><span class="tag-hash">#</span>{{tag}}</h1>
      <p class="tag-page-count">{{pageCount}} documents</p>
    </header>

    <main>
      <ul class="tag-page-list">
        {{#each pages}}
        <li class="tag-page-item">
          <a href="{{url}}" class="tag-page-link">{{title}}</a>
          {{#if date}}
          <span class="date">{{date}}</span>
          {{/if}}
        </li>
        {{/each}}
      </ul>
    </main>

    <footer>
      <p>Generated by my-obsidian</p>
    </footer>
  </div>
</body>
</html>
